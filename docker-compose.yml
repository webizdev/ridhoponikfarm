version: '3.8'

services:
  web:
    build: .
    container_name: ridhoponic_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    networks:
      - ridhoponic_net

  db:
    image: mysql:8.0
    container_name: ridhoponic_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: WSYLBt7EZHzyH4wLg6BZ
      MYSQL_DATABASE: alilogis_ridhoponicfarm
      MYSQL_USER: alilogis_ridhoponicfarm
      MYSQL_PASSWORD: WSYLBt7EZHzyH4wLg6BZ
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ridhoponic_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ridhoponic_pma
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: alilogis_ridhoponicfarm
      PMA_PASSWORD: WSYLBt7EZHzyH4wLg6BZ
    depends_on:
      - db
    networks:
      - ridhoponic_net

networks:
  ridhoponic_net:
    driver: bridge

volumes:
  db_data:
